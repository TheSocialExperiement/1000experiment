<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 1000 Square Experiment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
    text-align:center;
    padding:40px 20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    color:#bbb;
    margin-bottom:35px;
    font-size:20px;
}

.progressBox{
    width:100%;
    max-width:700px;
    height:26px;
    background:#2a2a2a;
    margin:0 auto;
    border-radius:30px;
    overflow:hidden;
}

.progressFill{
    background:#39d353;
    height:100%;
    width:0%;
    transition:.4s;
}

#progressText{
    margin:15px 0 40px;
    font-size:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(40,16px);
    gap:4px;
    justify-content:center;
    margin:auto;
}

.square{
    width:16px;
    height:16px;
    background:#444;
    border-radius:2px;
    font-size:8px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.15s;
    user-select:none;
}

.square.claimed{
    background:#39d353;
    color:#111;
}

.square.highlight{
    outline:2px solid white;
    transform:scale(1.3);
    z-index:2;
}

.button{
    display:inline-block;
    margin-top:35px;
    background:#39d353;
    color:#111;
    padding:16px 32px;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    font-size:20px;
}

.tooltip{
    position:fixed;
    background:#222;
    color:white;
    padding:12px;
    border-radius:10px;
    pointer-events:none;
    opacity:0;
    transition:.15s;
    text-align:left;
    font-size:14px;
    border:1px solid #555;
    max-width:230px;
}

#supporters{
    max-width:700px;
    margin:60px auto 0;
    text-align:left;
}

#supporters h2{
    margin-bottom:15px;
}

.supporter{
    padding:8px 0;
    border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>The 1000 Square Experiment</h1>

<p class="subtitle">
Every $1 permanently claims one of only 1000 squares.
</p>

<div class="progressBox">
<div class="progressFill" id="fill"></div>
</div>

<div id="progressText"></div>

<div class="grid" id="grid"></div>

<a href="#" class="button">Claim Your Squares</a>

<div id="supporters">
<h2>Supporters</h2>
<div id="supporterList"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>

const donors=[

{
initials:"CS",
name:"Corey Snow",
country:"🇳🇿 New Zealand",
amount:10,
message:"Thanks for visiting!"
},

{
initials:"JD",
name:"John Doe",
country:"🇦🇺 Australia",
amount:6,
message:"Good luck!"
},

{
initials:"AM",
name:"Alice Martin",
country:"🇺🇸 USA",
amount:15,
message:"Love this idea."
}

];

const grid=document.getElementById("grid");
const tooltip=document.getElementById("tooltip");
const supporterList=document.getElementById("supporterList");

let claimed=0;
let donorIndex=0;

donors.forEach(donor=>{

let colour=`hsl(${(donorIndex*110)%360},70%,55%)`;

for(let i=0;i<donor.amount;i++){

const square=document.createElement("div");

square.className="square claimed";
square.innerText=donor.initials;
square.style.background=colour;
square.dataset.owner=donorIndex;

square.addEventListener("mouseenter",(e)=>{

document.querySelectorAll(`[data-owner='${donorIndex}']`).forEach(s=>{
s.classList.add("highlight");
});

tooltip.innerHTML=
"<strong>"+donor.name+"</strong><br><br>"+
donor.country+"<br>"+
donor.amount+" Squares<br><br>"+
donor.message;

tooltip.style.left=(e.pageX+15)+"px";
tooltip.style.top=(e.pageY+15)+"px";
tooltip.style.opacity=1;

});

square.addEventListener("mousemove",(e)=>{

tooltip.style.left=(e.pageX+15)+"px";
tooltip.style.top=(e.pageY+15)+"px";

});

square.addEventListener("mouseleave",()=>{

document.querySelectorAll(`[data-owner='${donorIndex}']`).forEach(s=>{
s.classList.remove("highlight");
});

tooltip.style.opacity=0;

});

grid.appendChild(square);

claimed++;

}

supporterList.innerHTML+=
`<div class="supporter"><strong>${donor.initials}</strong> - ${donor.name} (${donor.amount} squares)</div>`;

donorIndex++;

});

while(claimed<1000){

const square=document.createElement("div");
square.className="square";
grid.appendChild(square);

claimed++;

}

const used=donors.reduce((a,b)=>a+b.amount,0);

document.getElementById("progressText").innerHTML=
used+" / 1000 Squares Claimed";

document.getElementById("fill").style.width=(used/1000*100)+"%";

</script>

</body>
</html>
