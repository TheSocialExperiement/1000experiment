<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 1000 Square Experiment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:
radial-gradient(circle at top,#1b2433 0%,#111 45%,#0a0a0a 100%);
color:white;
text-align:center;
padding:50px 20px;
}

h1{
font-size:54px;
margin-bottom:8px;
letter-spacing:1px;
}

.tagline{
font-size:24px;
font-weight:300;
color:#d4d7dc;
margin-bottom:25px;
}

.subtitle{
max-width:760px;
margin:0 auto 40px;
color:#b7b7b7;
font-size:20px;
line-height:1.6;
}

.progressBox{
width:100%;
max-width:760px;
height:28px;
background:#2a2a2a;
margin:0 auto;
border-radius:30px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.35);
}

.progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#39d353,#68ff8b);
transition:.6s;
}

#progressText{
margin:18px 0 45px;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(40,20px);
gap:5px;
justify-content:center;
margin:auto;
}

.square{
width:20px;
height:20px;
background:#444;
border-radius:4px;
font-size:9px;
font-weight:bold;
display:flex;
justify-content:center;
align-items:center;
transition:.15s;
cursor:pointer;
user-select:none;
}

.square.claimed{
color:#111;
}

.square:hover{
transform:scale(1.15);
}

.square.highlight{
outline:2px solid white;
transform:scale(1.35);
z-index:5;
}

.button{
display:inline-block;
margin-top:45px;
background:#39d353;
color:#111;
padding:18px 38px;
text-decoration:none;
border-radius:12px;
font-size:22px;
font-weight:bold;
transition:.2s;
box-shadow:0 10px 25px rgba(57,211,83,.25);
}

.button:hover{
transform:translateY(-3px);
box-shadow:0 18px 35px rgba(57,211,83,.35);
}

.tooltip{
position:fixed;
background:#1d1d1d;
border:1px solid #555;
border-radius:12px;
padding:14px;
text-align:left;
font-size:14px;
max-width:240px;
pointer-events:none;
opacity:0;
transition:.15s;
box-shadow:0 12px 30px rgba(0,0,0,.45);
}

.tooltip strong{
font-size:16px;
display:block;
margin-bottom:8px;
}

#supporters{
max-width:760px;
margin:70px auto 0;
text-align:left;
}

#supporters h2{
margin-bottom:20px;
font-size:28px;
}

.supporter{
padding:12px 0;
border-bottom:1px solid #2d2d2d;
transition:.2s;
}

.supporter:hover{
padding-left:8px;
}

footer{
margin-top:70px;
color:#777;
font-size:14px;
}

@media(max-width:700px){

.grid{
grid-template-columns:repeat(25,20px);
}

h1{
font-size:42px;
}

.tagline{
font-size:20px;
}

.subtitle{
font-size:18px;
}

}

</style>

</head>

<body>

<h1>The 1000 Square Experiment</h1>

<div class="tagline">
Can 1,000 strangers build something together?
</div>

<p class="subtitle">
Every <strong>$1</strong> permanently claims one of only <strong>1,000</strong> squares.
Once every square has an owner, the experiment is complete forever.
</p>

<div class="progressBox">
<div class="progressFill" id="fill"></div>
</div>

<div id="progressText"></div>

<div class="grid" id="grid"></div>

<a href="#" class="button">
Claim Your Place
</a>

<div id="supporters">

<h2>Supporters</h2>

<div id="supporterList"></div>

</div>

<footer>

Every square can only be claimed once.

</footer>

<div class="tooltip" id="tooltip"></div>

<script>

const donors=[];

const grid=document.getElementById("grid");
const tooltip=document.getElementById("tooltip");
const supporterList=document.getElementById("supporterList");

let claimed=0;
let donorIndex=0;

donors.forEach(donor=>{

const colour=`hsl(${(donorIndex*137)%360},70%,55%)`;

for(let i=0;i<donor.amount;i++){

const square=document.createElement("div");

square.className="square claimed";
square.innerText=donor.initials;
square.style.background=colour;
square.dataset.owner=donorIndex;

square.addEventListener("mouseenter",(e)=>{

document.querySelectorAll(`[data-owner='${donorIndex}']`).forEach(s=>{
s.classList.add("highlight");
});

tooltip.innerHTML=
"<strong>"+donor.name+"</strong>"+
"<br>"+donor.country+
"<br><br>"+
"<strong>"+donor.amount+"</strong> Squares"+
(donor.message ? "<br><br><em>"+donor.message+"</em>" : "");

tooltip.style.left=(e.pageX+18)+"px";
tooltip.style.top=(e.pageY+18)+"px";
tooltip.style.opacity=1;

});

square.addEventListener("mousemove",(e)=>{

tooltip.style.left=(e.pageX+18)+"px";
tooltip.style.top=(e.pageY+18)+"px";

});

square.addEventListener("mouseleave",()=>{

document.querySelectorAll(`[data-owner='${donorIndex}']`).forEach(s=>{
s.classList.remove("highlight");
});

tooltip.style.opacity=0;

});

grid.appendChild(square);

claimed++;

}

supporterList.innerHTML+=`<div class="supporter">
<strong>${donor.initials}</strong> — ${donor.name}
<span style="float:right;color:#8de69e;">${donor.amount} Squares</span>
</div>`;

donorIndex++;

});

while(claimed<1000){

const square=document.createElement("div");
square.className="square";
grid.appendChild(square);

claimed++;

}

const used=donors.reduce((a,b)=>a+b.amount,0);

document.getElementById("progressText").innerHTML=
used+" / 1000 Squares Claimed";

document.getElementById("fill").style.width=(used/1000*100)+"%";

if(donors.length===0){

supporterList.innerHTML=
'<div style="color:#888;padding:15px 0;">No supporters yet. Be the first to claim your place.</div>';

}

</script>

</body>
</html>
